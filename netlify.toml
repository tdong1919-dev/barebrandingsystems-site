# Bare Branding — Netlify configuration

[build]
  publish = "."

# ─── Redirects ──────────────────────────────────────────────────────────────
# Preserve old Squarespace/CMS blog post URLs — add each slug below as you
# migrate posts. Format: [[redirects]] from = "/old-path" to = "/new-path"
#
# Force www → non-www (or flip to non-www → www to match your DNS choice)
[[redirects]]
  from = "https://barebranding.site/*"
  to   = "https://www.barebranding.site/:splat"
  status = 301
  force  = true

# Legacy page aliases from the old site
[[redirects]]
  from = "/insights"
  to   = "/blog.html"
  status = 301

[[redirects]]
  from = "/insights.html"
  to   = "/blog.html"
  status = 301

[[redirects]]
  from = "/blog"
  to   = "/blog.html"
  status = 301

[[redirects]]
  from = "/about-us"
  to   = "/about.html"
  status = 301

[[redirects]]
  from = "/about-us.html"
  to   = "/about.html"
  status = 301

[[redirects]]
  from = "/ai-automation"
  to   = "/ai-automation.html"
  status = 301

[[redirects]]
  from = "/web3-rwa"
  to   = "/web3-rwa.html"
  status = 301

[[redirects]]
  from = "/lms-insight-analysis"
  to   = "/lms-insight-analysis.html"
  status = 301

# ─── Security & performance headers ────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML — revalidate on each visit
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
